<svg xmlns="http://www.w3.org/2000/svg" width="200mm" height="160mm" viewBox="-10 -10 200 160">

<!-- Base plate -->
<rect x="0" y="0" width="110" height="140" stroke="#FF0000" stroke-width="0.1" fill="none"/>

<!-- Base tabs (3mm deep, 20mm wide) -->
<rect x="-3" y="0" width="3" height="140" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<rect x="110" y="0" width="3" height="140" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<rect x="0" y="-3" width="110" height="3" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<rect x="0" y="140" width="110" height="3" stroke="#FF0000" stroke-width="0.1" fill="none"/>

<!-- Frame -->
<rect x="110" y="140" width="70" height="110" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<!-- Frame interior tabs (hashes) -->
<rect x="113" y="143" width="64" height="64" stroke="#FF0000" stroke-width="0.1" fill="none"/>

<!-- Side pieces (simplified layout) -->
<rect x="120" y="150" width="40" height="20" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<rect x="120" y="170" width="40" height="20" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<rect x="160" y="150" width="40" height="20" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<rect x="160" y="170" width="40" height="20" stroke="#FF0000" stroke-width="0.1" fill="none"/>

<!-- Circle holes -->
<circle cx="130" cy="190" r="7.5" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<circle cx="160" cy="190" r="7.5" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<circle cx="190" cy="190" r="7.5" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<circle cx="130" cy="220" r="7.5" stroke="#FF0000" stroke-width="0.1" fill="none"/>
<circle cx="160" cy="220" r="7.5" stroke="#FF0000" stroke-width="0.1" fill="none"/>

</svg>